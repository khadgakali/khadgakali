<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Index of / - git.khadgakali.edu.np</title>
    <style>
        body { font-family: monospace; background: #fff; padding: 20px; color: #000; }
        .header { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; border-bottom: 1px solid #000; padding: 10px; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
        .copy-link { 
            color: #0000ee; cursor: pointer; text-decoration: underline; 
            font-size: 0.8em; margin-left: 15px; 
        }
        .file-name { text-decoration: none; color: #000; font-weight: bold; }
        .file-name:hover { color: #0000ee; }
        #status { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Index of /</h1>
        <p id="status">Scanning local manifest...</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>File Name</th>
                <th>Hotlink</th>
            </tr>
        </thead>
        <tbody id="file-list"></tbody>
    </table>

<script>
    const BASE_URL = window.location.origin;

    async function loadFiles() {
        const list = document.getElementById('file-list');
        const status = document.getElementById('status');
        
        try {
            // Fetch the auto-generated JSON
            const response = await fetch('./files.json?t=' + Date.now());
            if (!response.ok) throw new Error("Manifest not found. Wait for GitHub Action to finish.");
            
            const files = await response.json();
            status.innerText = `Total items found: ${files.length}`;
            list.innerHTML = "";

            files.forEach(file => {
                const hotlink = `${BASE_URL}/${file.path}`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <a href="${hotlink}" class="file-name" target="_blank">📄 ${file.name}</a>
                    </td>
                    <td>
                        <code style="background:#eee;padding:2px 5px;">${hotlink}</code>
                        <span class="copy-link" onclick="copyText('${hotlink}')">[Copy]</span>
                    </td>
                `;
                list.appendChild(tr);
            });
        } catch (e) {
            status.innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
        }
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Hotlink copied to clipboard!");
    }

    loadFiles();
</script>
</body>
</html>
