<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotlink Manager - Local Index</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 40px; background: #f6f8fa; }
        .container { max-width: 800px; margin: 0 auto; background: white; border: 1px solid #d1d5da; border-radius: 6px; padding: 20px; }
        h1 { font-size: 20px; border-bottom: 1px solid #eaecef; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #eaecef; vertical-align: middle; }
        .name { font-weight: 600; color: #0366d6; text-decoration: none; }
        .btn { 
            background: #2ea44f; color: white; border: 1px solid rgba(27,31,35,.15);
            padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
        }
        .btn:active { background: #2c974b; }
        .path-text { font-size: 12px; color: #586069; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Internal File Index</h1>
    <table id="file-table">
        <tbody>
            <tr><td>Loading manifest...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const BASE_URL = "https://git.khadgakali.edu.np";

    async function loadFiles() {
        const table = document.querySelector('#file-table tbody');
        try {
            // Fetching your local JSON instead of the GitHub API
            const response = await fetch('./files.json');
            if (!response.ok) throw new Error("Manifest not found");
            const files = await response.json();

            table.innerHTML = "";

            files.forEach(file => {
                const fullUrl = `${BASE_URL}/${file.path}`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <a href="${fullUrl}" class="name" target="_blank">${file.name}</a>
                        <span class="path-text">/${file.path}</span>
                    </td>
                    <td style="text-align:right">
                        <button class="btn" onclick="copyLink('${fullUrl}', this)">Copy Hotlink</button>
                    </td>
                `;
                table.appendChild(tr);
            });
        } catch (e) {
            table.innerHTML = "<tr><td>Error: Create a files.json file in root.</td></tr>";
        }
    }

    function copyLink(url, btn) {
        navigator.clipboard.writeText(url);
        const oldText = btn.innerText;
        btn.innerText = "Copied!";
        btn.style.background = "#6a737d";
        setTimeout(() => { 
            btn.innerText = oldText; 
            btn.style.background = "#2ea44f";
        }, 1500);
    }

    loadFiles();
</script>

</body>
</html>
