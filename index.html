<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --link: #0000ee;
            --border: #cccccc;
        }
        body { 
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; 
            background: var(--bg); 
            color: var(--text); 
            padding: 25px; 
            line-height: 1.4;
            margin: 0;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin: 0 0 10px 0; font-weight: bold; }
        
        .breadcrumb { margin-bottom: 20px; padding: 5px 0; border-bottom: 1px solid var(--border); }
        .breadcrumb a { color: var(--link); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; border-bottom: 1px solid #000; padding: 10px 5px; font-weight: bold; }
        td { padding: 8px 5px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
        
        .name-col { width: 60%; }
        .size-col { width: 20%; text-align: right; }
        .date-col { width: 20%; text-align: right; color: #666; }

        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .icon { margin-right: 8px; opacity: 0.7; }
        .error-message { 
            background: #fff0f0; 
            color: #d12d2d; 
            padding: 15px; 
            border: 1px solid #d12d2d; 
            margin-bottom: 20px; 
            display: none; 
            font-size: 14px;
        }
        
        footer { margin-top: 40px; font-size: 12px; color: #888; border-top: 1px solid var(--border); padding-top: 10px; }
        
        @media (max-width: 600px) {
            .date-col { display: none; }
            body { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="error-display" class="error-message"></div>
    
    <h1 id="dir-title">Index of /</h1>
    <div id="breadcrumb" class="breadcrumb"></div>

    <table>
        <thead>
            <tr>
                <th class="name-col">Name</th>
                <th class="size-col">Size</th>
                <th class="date-col">Description</th>
            </tr>
        </thead>
        <tbody id="listing">
            <tr><td colspan="3">Loading file system...</td></tr>
        </tbody>
    </table>

    <footer>
        GitHub Static Explorer/2.0 (git.khadgakali.edu.np)
    </footer>
</div>

<script>
    // --- MANDATORY CONFIGURATION ---
    const CONFIG = {
        username: 'khadgakali',
        repo: 'git', // The repo name must match exactly what is on GitHub
        branch: 'main' // Change to 'master' if your repo uses the old default
    };

    async function listDirectory(path = "") {
        const listing = document.getElementById('listing');
        const errorDisplay = document.getElementById('error-display');
        const breadcrumb = document.getElementById('breadcrumb');
        const dirTitle = document.getElementById('dir-title');

        errorDisplay.style.display = 'none';
        dirTitle.innerText = `Index of /${path}`;

        // Update Breadcrumbs
        let breadHTML = '<a href="javascript:listDirectory(\'\')">root</a>';
        let currentPath = '';
        if (path) {
            const parts = path.split('/');
            parts.forEach((part) => {
                currentPath += (currentPath ? '/' : '') + part;
                breadHTML += ` / <a href="javascript:listDirectory('${currentPath}')">${part}</a>`;
            });
        }
        breadcrumb.innerHTML = breadHTML;

        try {
            const apiURL = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${path}`;
            const response = await fetch(apiURL);

            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.message || "Failed to fetch directory contents.");
            }

            const items = await response.json();
            listing.innerHTML = '';

            // Add Parent Directory link
            if (path !== "") {
                const parentPath = path.split('/').slice(0, -1).join('/');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="3"><a href="javascript:listDirectory('${parentPath}')">📂 .. (Parent Directory)</a></td>`;
                listing.appendChild(tr);
            }

            // Sort: Directories first, then files
            items.sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1));

            items.forEach(item => {
                // Hide system files
                if (['index.html', '404.html', '.nojekyll', 'CNAME'].includes(item.name)) return;

                const tr = document.createElement('tr');
                const isDir = item.type === 'dir';
                const icon = isDir ? '📁' : '📄';
                
                // Link logic: folders call JS, files go to raw view
                const link = isDir 
                    ? `javascript:listDirectory('${item.path}')` 
                    : `https://raw.githubusercontent.com/${CONFIG.username}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`;

                tr.innerHTML = `
                    <td class="name-col"><span class="icon">${icon}</span><a href="${link}">${item.name}${isDir ? '/' : ''}</a></td>
                    <td class="size-col">${isDir ? '-' : formatSize(item.size)}</td>
                    <td class="date-col">${isDir ? 'Directory' : 'File'}</td>
                `;
                listing.appendChild(tr);
            });

        } catch (err) {
            errorDisplay.innerText = "Error: " + err.message;
            errorDisplay.style.display = 'block';
            listing.innerHTML = '<tr><td colspan="3">Listing failed. Check if repository name is correct.</td></tr>';
        }
    }

    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + ['B', 'KB', 'MB', 'GB'][i];
    }

    // Initial load
    listDirectory("");
</script>

</body>
</html>
