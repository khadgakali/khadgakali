---
layout: null
---
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Index of / - Hotlink Manager</title>
    <style>
        body { font-family: monospace; padding: 30px; background: #fff; }
        .breadcrumb { font-weight: bold; margin-bottom: 20px; font-size: 1.2em; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; border-bottom: 1px solid #000; padding: 10px; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
        .copy-btn { background: #0056b3; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 10px; }
        .file-link { color: #0000ee; text-decoration: none; }
    </style>
</head>
<body>

    <div class="breadcrumb">Index of / (Build-time Listing)</div>

    <table>
        <thead>
            <tr>
                <th>File Name</th>
                <th style="text-align:right">Hotlink Action</th>
            </tr>
        </thead>
        <tbody>
            {% for file in site.static_files %}
            <tr>
                <td>
                    <a href="{{ site.baseurl }}{{ file.path }}" class="file-link">
                        📄 {{ file.path | remove_first: "/" }}
                    </a>
                </td>
                <td style="text-align:right">
                    <button class="copy-btn" onclick="copyHotlink('https://git.khadgakali.edu.np{{ file.path }}', this)">
                        Copy Hotlink
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        function copyHotlink(url, btn) {
            navigator.clipboard.writeText(url);
            const original = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = original;
                btn.style.background = "#0056b3";
            }, 1500);
        }
    </script>
</body>
</html>
