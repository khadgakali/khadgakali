name: Generate Deep File List
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate JSON Map
        run: |
          # This finds all files, excluding hidden folders and system files
          # It creates a JSON array of paths
          echo "[" > files.json
          find . -type f -not -path '*/.*' -not -name "files.json" -not -name "index.html" -not -name "404.html" -not -name "CNAME" | sed 's|^\./||' | while read line; do
            echo "  \"$line\"," >> files.json
          done
          sed -i '$ s/,$//' files.json
          echo "]" >> files.json

      - name: Commit changes
        run: |
          git config --global user.name "Link-Bot"
          git config --global user.email "bot@khadgakali.edu.np"
          git add files.json
          git commit -m "Updated file index" || exit 0
          git push
