        /* TOP 5 ROW (SINGLE ROW FOR PRINT) */

        .top-performers-row {

        /* Partial GPA colors (light) */

        .gpa-40-partial { background: #dbeafe; color: #0c4a6e; }

        .gpa-36-partial { background: #e0e7ff; color: #3730a3; }

        .gpa-32-partial { background: #f3e8ff; color: #6b21a8; }

        .gpa-28-partial { background: #f0fdf4; color: #166534; }

        .gpa-24-partial { background: #fef3c7; color: #92400e; }

        .gpa-20-partial { background: #fed7aa; color: #9a3412; }

        .gpa-16-partial { background: #ddd6fe; color: #4f46e5; }

        .gpa-graded { background: #fce7f3; color: #be185d; }



        .master-summary-table { width: 100%; margin-top: 25px; border-collapse: collapse; font-size: 13px; border: 2px solid #1e3a8a; background: #fff; }

        .master-summary-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; }

        .data-label { font-weight: 800; color: #1e3a8a; background: #f8fafc; font-size: 11px; text-transform: uppercase; }

        .data-val { font-weight: 900; font-size: 16px; color: #111827; }



        .chart-container-outer { position: relative; margin-top: 20px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 15px; }

        .chart-switcher-box { position: absolute; top: 15px; right: 15px; z-index: 10; }



        /* PRINTING MECHANISM */

        @media print {

            body * { visibility: hidden; }

            #masterRecordUI, #masterRecordUI * { visibility: visible; }

            .gpa-box { -webkit-print-color-adjust: exact; }

            .admin-header { -webkit-print-color-adjust: exact; }

        }

    <script>

        const SHEET_ID = '1pWdR2XztXTexHVT_zqssUKibQg9JUdhAiBjIAbFVmKE';

        const NO_PHOTO = 'https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg';

        let availableYears = [];



        // Dynamic Academic Year Selection Logic

        (function initAcademicYear() {

            const today = new Date();

            const currentYearAD = today.getFullYear();

            const currentMonthAD = today.getMonth(); // 0-11

            const currentYearBS = currentYearAD + 57;



            // Logic: Default to current year - 1, switch to current year after Ashad (month >= 5)

            let academicYearDefault = (currentMonthAD >= 5) ? currentYearBS : (currentYearBS - 1);



            const sel = document.getElementById('yearSelect');

            sel.innerHTML = '';

            for (let yr = currentYearBS; yr >= 2077; yr--) {

                availableYears.push(yr);

                const opt = document.createElement('option');

                opt.value = yr;

                opt.innerText = yr + " B.S.";

                if(yr === academicYearDefault) opt.selected = true;

                sel.appendChild(opt);

            }

        })();



        async function fetchSheetData(year) {

            try {

                const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${year}`);

                const t = await r.text();

                return JSON.parse(t.substring(47).slice(0, -2));

            } catch (e) { return null; }

        }



        function isNG(gpa, status) {

            gpa = parseFloat(gpa) || 0;

            status = (status || "").toLowerCase();

            return gpa < 1.6 || status === "ng" || status === "failed";

        }



        async function openAdmin() {

            const passkey = document.getElementById('authKey').value;

            const json = await fetchSheetData(passkey);

            if(!json) { document.getElementById('authError').style.display = 'block'; return; }



            let stats = {

                total: 0, reg: 0, part: 0, regPass: 0, regNG: 0, partPass: 0, partNG: 0, regGPASum: 0,

                students: [],

                regIntervals: { "4.0": 0, "3.6": 0, "3.2": 0, "2.8": 0, "2.4": 0, "2.0": 0, "1.6": 0, "NG": 0 },

                partIntervals: { "4.0": 0, "3.6": 0, "3.2": 0, "2.8": 0, "2.4": 0, "2.0": 0, "1.6": 0, "Graded": 0 }

            };



            let tableHtml = `<table class="zebra-table"><thead><tr><th>Reg No</th><th>Symbol</th><th>Name</th><th>Type</th><th>GPA</th><th>Status</th></tr></thead><tbody>`;

            

            json.table.rows.forEach(row => {

                const regNo = row.c[0]?.v || '-';

                const symbol = row.c[1]?.v || '-';

                const name = row.c[2]?.v || '-';

                const gpaVal = parseFloat(row.c[3]?.v) || 0;

                const status = (row.c[4]?.v || "").toLowerCase();

                const type = (row.c[5]?.v || "Regular").toLowerCase();

                const photo = row.c[6]?.v || NO_PHOTO;

                const ng = isNG(gpaVal, status);



                stats.total++;



                if(type.includes("partial")) {

                    stats.part++;

                    if(ng) {

                        stats.partNG++;

                        stats.partIntervals["NG"]++;

                    } else {

                        stats.partPass++;

                        if(gpaVal === 0) {

                            stats.partIntervals["Graded"]++;

                        } else if(gpaVal >= 3.6) {

                            stats.partIntervals["4.0"]++;

                        } else if(gpaVal >= 3.2) {

                            stats.partIntervals["3.6"]++;

                        } else if(gpaVal >= 2.8) {

                            stats.partIntervals["3.2"]++;

                        } else if(gpaVal >= 2.4) {

                            stats.partIntervals["2.8"]++;

                        } else if(gpaVal >= 2.0) {

                            stats.partIntervals["2.4"]++;

                        } else if(gpaVal >= 1.6) {

                            stats.partIntervals["2.0"]++;

                        } else {

                            stats.partIntervals["1.6"]++;

                        }

                    }

                } else {

                    stats.reg++;

                    stats.regGPASum += gpaVal;

                    if(gpaVal > 0) stats.students.push({ name, gpa: gpaVal, photo });

                    

                    if(ng) {

                        stats.regNG++;

                        stats.regIntervals["NG"]++;

                    } else {

                        stats.regPass++;

                        if(gpaVal >= 3.6) {

                            stats.regIntervals["4.0"]++;

                        } else if(gpaVal >= 3.2) {

                            stats.regIntervals["3.6"]++;

                        } else if(gpaVal >= 2.8) {

                            stats.regIntervals["3.2"]++;

                        } else if(gpaVal >= 2.4) {

                            stats.regIntervals["2.8"]++;

                        } else if(gpaVal >= 2.0) {

                            stats.regIntervals["2.4"]++;

                        } else if(gpaVal >= 1.6) {

                            stats.regIntervals["2.0"]++;

                        } else {

                            stats.regIntervals["1.6"]++;

                        }

                    }

                }



                const statusClass = ng ? 'status-ng' : 'status-pass';

                const displayGPA = type.includes('partial') ? '-' : gpaVal.toFixed(2);

                tableHtml += `<tr><td>${regNo}</td><td>${symbol}</td><td style="text-align:left; font-weight:600">${name}</td><td>${row.c[5]?.v || 'Regular'}</td><td>${displayGPA}</td><td class="${statusClass}">${status.toUpperCase()}</td></tr>`;

            });

            tableHtml += `</tbody></table>`;



            // Top 5 performers (only from regular students with valid GPA)

            const top5 = stats.students.sort((a,b) => b.gpa - a.gpa).slice(0,5);

            let galleryHtml = "";

            top5.forEach((s, i) => {

                galleryHtml += `<div class="performer-card rank-${i+1}"><img src="${s.photo}" onerror="this.src='${NO_PHOTO}'"><span class="performer-name">${s.name}</span><span class="performer-gpa">${s.gpa.toFixed(2)}</span><div class="performer-badge">Top ${i+1}</div></div>`;

            });



            // GPA Distribution Boxes

            let regGPAHtml = `

                <div class="gpa-box gpa-40"><div class="gpa-label">3.61-4.0</div><div class="gpa-count">${stats.regIntervals["4.0"]}</div></div>

                <div class="gpa-box gpa-36"><div class="gpa-label">3.21-3.6</div><div class="gpa-count">${stats.regIntervals["3.6"]}</div></div>

                <div class="gpa-box gpa-32"><div class="gpa-label">2.81-3.2</div><div class="gpa-count">${stats.regIntervals["3.2"]}</div></div>

                <div class="gpa-box gpa-28"><div class="gpa-label">2.41-2.8</div><div class="gpa-count">${stats.regIntervals["2.8"]}</div></div>

                <div class="gpa-box gpa-24"><div class="gpa-label">2.01-2.4</div><div class="gpa-count">${stats.regIntervals["2.4"]}</div></div>

                <div class="gpa-box gpa-20"><div class="gpa-label">1.61-2.0</div><div class="gpa-count">${stats.regIntervals["2.0"]}</div></div>

                <div class="gpa-box gpa-16"><div class="gpa-label">1.21-1.6</div><div class="gpa-count">${stats.regIntervals["1.6"]}</div></div>

                <div class="gpa-box gpa-ng-reg"><div class="gpa-label">NG</div><div class="gpa-count">${stats.regIntervals["NG"]}</div></div>

            `;



            let partGPAHtml = `

                <div class="gpa-box gpa-40-partial"><div class="gpa-label">3.61-4.0</div><div class="gpa-count">${stats.partIntervals["4.0"]}</div></div>

                <div class="gpa-box gpa-36-partial"><div class="gpa-label">3.21-3.6</div><div class="gpa-count">${stats.partIntervals["3.6"]}</div></div>

                <div class="gpa-box gpa-32-partial"><div class="gpa-label">2.81-3.2</div><div class="gpa-count">${stats.partIntervals["3.2"]}</div></div>

                <div class="gpa-box gpa-28-partial"><div class="gpa-label">2.41-2.8</div><div class="gpa-count">${stats.partIntervals["2.8"]}</div></div>

                <div class="gpa-box gpa-24-partial"><div class="gpa-label">2.01-2.4</div><div class="gpa-count">${stats.partIntervals["2.4"]}</div></div>

                <div class="gpa-box gpa-20-partial"><div class="gpa-label">1.61-2.0</div><div class="gpa-count">${stats.partIntervals["2.0"]}</div></div>

                <div class="gpa-box gpa-16-partial"><div class="gpa-label">1.21-1.6</div><div class="gpa-count">${stats.partIntervals["1.6"]}</div></div>

                <div class="gpa-box gpa-graded"><div class="gpa-label">Graded</div><div class="gpa-count">${stats.partIntervals["Graded"]}</div></div>

            `;



            const avgGPA = stats.reg > 0 ? (stats.regGPASum / stats.reg).toFixed(2) : "0.00";

            const regPassPer = stats.reg > 0 ? ((stats.regPass/stats.reg)*100).toFixed(1) : 0;

            const partPassPer = stats.part > 0 ? ((stats.partPass/stats.part)*100).toFixed(1) : 0;



            let summaryHtml = `

            <table class="master-summary-table">

                <tr><td class="data-label">Overview</td><td>Total: <span class="data-val">${stats.total}</span></td><td>Regular: <span class="data-val">${stats.reg}</span></td><td>Partial: <span class="data-val">${stats.part}</span></td></tr>

                <tr><td class="data-label">Regulars</td><td>Pass: <span class="data-val" style="color:#16a34a">${stats.regPass} (${regPassPer}%)</span></td><td>NG: <span class="data-val" style="color:#dc2626">${stats.regNG}</span></td><td>Avg GPA: <span class="data-val">${avgGPA}</span></td></tr>

                <tr><td class="data-label">Partials</td><td colspan="2">Pass: <span class="data-val" style="color:#16a34a">${stats.partPass} (${partPassPer}%)</span></td><td>NG: <span class="data-val" style="color:#dc2626">${stats.partNG}</span></td></tr>

            </table>`;



            document.getElementById('adminAuth').style.display = 'none';

            document.getElementById('adminPanel').style.display = 'block';

            document.getElementById('ledgerTitle').innerText = `SEE Grade Ledger ${passkey}`;

            document.getElementById('admList').innerHTML = tableHtml;

            document.getElementById('admSummaryGrid').innerHTML = summaryHtml;

            document.getElementById('topGallery').innerHTML = galleryHtml;

            document.getElementById('gpaRegularBoxes').innerHTML = regGPAHtml;

            document.getElementById('gpaPartialBoxes').innerHTML = partGPAHtml;

            renderMultiChart();

        }



        async function renderMultiChart() {

            const style = document.getElementById('chartStyle').value;

            let years = availableYears.slice(0, 5).reverse();

            let datasets = { rPass: [], rNG: [], pPass: [], pNG: [] };



            for(let y of years) {

                const d = await fetchSheetData(y);

                let rPass = 0, rNG = 0, pPass = 0, pNG = 0, total = 0;

                

                if(d) {

                    d.table.rows.forEach(r => {

                        const gpa = parseFloat(r.c[3]?.v) || 0;

                        const status = (r.c[4]?.v || "").toLowerCase();

                        const type = (r.c[5]?.v || "Regular").toLowerCase();

                        const ng = isNG(gpa, status);



                        if(type.includes("part")) {

                            if(ng) pNG++; else pPass++;

                        } else {

                            if(ng) rNG++; else rPass++;

                        }

                        total++;

                    });



                    datasets.rPass.push(total > 0 ? (rPass/total*100).toFixed(1) : 0);

                    datasets.rNG.push(total > 0 ? (rNG/total*100).toFixed(1) : 0);

                    datasets.pPass.push(total > 0 ? (pPass/total*100).toFixed(1) : 0);

                    datasets.pNG.push(total > 0 ? (pNG/total*100).toFixed(1) : 0);

                } else {

                    datasets.rPass.push(0); datasets.rNG.push(0); datasets.pPass.push(0); datasets.pNG.push(0);

                }

            }



            const ctx = document.getElementById('progressChart').getContext('2d');

            if(window.pChart) window.pChart.destroy();



            window.pChart = new Chart(ctx, {

                type: style,

                data: {

                    labels: years,

                    datasets: [

                        { label: 'Reg Pass %', data: datasets.rPass, borderColor: '#1e3a8a', backgroundColor: style==='bar'?'#3b82f6':'transparent', tension: 0.3, borderWidth: 3, borderRadius: 5 },

                        { label: 'Reg NG %', data: datasets.rNG, borderColor: '#dc2626', backgroundColor: style==='bar'?'#ef4444':'transparent', tension: 0.3, borderWidth: 3, borderRadius: 5 },

                        { label: 'Part Pass %', data: datasets.pPass, borderColor: '#10b981', backgroundColor: style==='bar'?'#10b981':'transparent', tension: 0.3, borderWidth: 3, borderRadius: 5 },

                        { label: 'Part NG %', data: datasets.pNG, borderColor: '#fbbf24', backgroundColor: style==='bar'?'#fbbf24':'transparent', tension: 0.3, borderWidth: 3, borderRadius: 5 }

                    ]

                },

                options: { 

                    maintainAspectRatio: false, 

                    scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } },

                    plugins: { legend: { display: true, position: 'top' } }

                }

            });

        }



        async function fetchLiveResult() {

            const yr = document.getElementById('yearSelect').value;

            const q = document.getElementById('userInput').value.trim().toLowerCase();

            const box = document.getElementById('resultBox');

            if(!q) return; box.style.display = "block"; box.innerHTML = '🔍 Searching...';

            const json = await fetchSheetData(yr);

            const match = json?.table.rows.find(r => (r.c[1]?.v||"").toString().toLowerCase() === q || (r.c[2]?.v||"").toLowerCase().includes(q));

            if(match) renderCard(match.c, yr); else box.innerHTML = "No record found.";

        }



        function renderCard(s, yr) {

            const gpa = s[3]?.v || "0.00";

            const status = (s[4]?.v || "").trim().toLowerCase();

            const isPass = !isNG(gpa, status);

            document.getElementById('resultBox').innerHTML = `

                <div class="capture-area" id="captureArea">

                    <div class="top-banner ${isPass?'banner-pass':'banner-fail'}">${isPass?'Congratulations!':'Result: '+status.toUpperCase()}</div>

                    <div class="star-container">★★★★★</div>

                    <div class="photo-section">

                        <div class="blue-bar"></div>

                        <div class="grad-cap cap-left">🎓</div><div class="grad-cap cap-right">🎓</div>

                        <div class="medal-icon m-left">🏅</div><div class="medal-icon m-right">🏅</div>

                        <div class="yellow-ribbon"></div>

                        <div class="student-photo-wrapper"><img src="${s[6]?.v || NO_PHOTO}"></div>

                    </div>

                    <div class="name-ribbon"><h2 class="student-name">${s[2]?.v}</h2></div>

                    <div class="unified-batch-ribbon"><div class="ribbon-left">BATCH: ${yr}</div><div class="ribbon-right">EXAM: ${s[5]?.v || 'REGULAR'}</div></div>

                    <div class="formal-msg-box">${isPass?'Heartiest congratulations!':'Keep working hard.'}</div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 20px 0;">

                        <div style="background:#1e3a8a; padding:6px; border-radius:10px; color:#fff; text-align:left;">

                            <span style="font-size:7px; font-weight:800; display:block;">SYMBOL NO.</span><span style="font-size:12px; font-weight:900;">${s[1]?.v}</span>

                        </div>

                        <div style="background:#1e3a8a; padding:6px; border-radius:10px; color:#fff; text-align:left;">

                            <span style="font-size:7px; font-weight:800; display:block;">REGIST. NO.</span><span style="font-size:12px; font-weight:900;">${s[0]?.v}</span>

                        </div>

                    </div>

                    <div class="score-bar">

                        <div style="text-align:left"><span style="font-size:8px; font-weight:800; display:block; color:#1e3a8a;">GPA</span><span style="font-size:1.4rem; font-weight:900;">${gpa}</span></div>

                        <div style="text-align:right"><span style="font-size:8px; font-weight:800; display:block; color:#1e3a8a;">STATUS</span><span style="font-size:0.85rem; font-weight:800; line-height:2.4;">${status.toUpperCase()}</span></div>

                    </div>

                </div>

                <button class="btn-main no-print" style="margin-top:15px; background:#059669;" onclick="downloadImage('${s[2]?.v}')">📥 SAVE AS IMAGE</button>`;

        }



        function downloadImage(name) {

            html2canvas(document.getElementById('captureArea'), {scale:3, useCORS:true}).then(canvas => {

                const link = document.createElement('a'); link.download = `${name}_Result.png`; link.href = canvas.toDataURL(); link.click();

            });

        }

        function toggleAuth(s) { document.getElementById('adminAuth').style.display = s?'flex':'none'; }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    </script>
