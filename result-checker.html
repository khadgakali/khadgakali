<div id="khadgakali-result-container">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap');



        /* PUBLIC INTERFACE STYLING */

        #khadgakali-result-container {

            font-family: 'Inter', sans-serif;

            background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%);

            padding: 15px; border-radius: 20px; max-width: 420px;

            margin: 10px auto; text-align: center; box-sizing: border-box;

            border: 1px solid #e2e8f0;

        }



        #khadgakali-result-container * { box-sizing: border-box; }

        .header-logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; color: #dc2626; margin-top: 5px; text-transform: uppercase; }

        .sub-header { color: #4b5563; font-weight: 600; font-size: 0.75rem; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #f3f4f6; }

        .search-controls { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-bottom: 10px; }

        select, input { padding: 10px; border-radius: 8px; border: 2px solid #e5e7eb; font-size: 13px; outline: none; width: 100%; height: 42px; }

        .btn-main { width: 100%; padding: 12px; background: #111827; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        #resultBox { margin-top: 15px; display: none; width: 100%; }



        /* THE ORIGINAL CARD DESIGN */

        .capture-area {

            background: #ffffff; border-radius: 24px; overflow: hidden; position: relative; width: 100%; 

            padding-bottom: 15px; border: 6px solid #1e3a8a; outline: 2px solid #eab308; outline-offset: -4px;

            box-shadow: 0 20px 50px rgba(30,58,138,0.15);

        }

        .top-banner { padding: 10px; color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; position: relative; z-index: 10; }

        .banner-pass { background: #5a57e6; } .banner-fail { background: #dc2626; } .banner-pending { background: #64748b; }

        .star-container { margin: 4px 0 0px; color: #facc15; font-size: 22px; position: relative; z-index: 10; }

        .photo-section { position: relative; height: 165px; display: flex; justify-content: center; align-items: center; margin-top: 5px; }

        .blue-bar { position: absolute; width: 100%; height: 45px; background: #1e3a8a; z-index: 1; }

        .medal-icon { position: absolute; font-size: 24px; z-index: 20; top: 50%; transform: translateY(-50%); }

        .m-left { left: 15%; } .m-right { right: 15%; }

        .yellow-ribbon { position: absolute; width: 140px; height: 145px; background: #eab308; z-index: 2; clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 88%, 0 100%); }

        .grad-cap { position: absolute; font-size: 28px; z-index: 30; top: -10px; }

        .cap-left { left: 125px; transform: rotate(-15deg); } .cap-right { right: 125px; transform: rotate(15deg); }

        .student-photo-wrapper { width: 110px; height: 110px; border-radius: 50%; border: 5px solid #fff; position: relative; z-index: 20; background: #fff; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        .student-photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .name-ribbon { display: inline-block; max-width: 90%; padding: 4px 15px; background: #fff1f2; border: 2px solid #EAB308; border-radius: 35px; margin: 8px auto; position: relative; z-index: 25; }

        .student-name { font-family: 'Outfit'; font-size: clamp(0.85rem, 4vw, 1.1rem); font-weight: 900; color: #dc2626 !important; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .unified-batch-ribbon { display: inline-flex; border-radius: 6px; overflow: hidden; margin-bottom: 8px; color: white; font-size: 9px; font-weight: 800; }

        .ribbon-left { background: #1e3a8a; padding: 6px 12px; }

        .ribbon-right { background: #0d9488; padding: 6px 12px; border-left: 1px solid rgba(255,255,255,0.2); }

        .formal-msg-box { font-size: 0.7rem; padding: 10px 15px; color: #fff; background: #1e3a8a; border-top: 3px solid #eab308; position: relative; z-index: 10; font-weight: 600; line-height: 1.4; }

        .score-bar { margin: 10px 20px 5px; display: flex; justify-content: space-between; padding: 10px 18px; border-radius: 12px; background: #facc15; }



        /* ADMIN SECTION */

        #adminPanel { display: none; position: fixed; inset: 0; background: white; z-index: 9999; overflow-y: auto; padding: 30px; }

        .zebra-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; border: 1px solid #ccc; }

        .zebra-table th { background: #1e3a8a; color: white; padding: 12px 8px; text-align: center; }

        .zebra-table td { padding: 10px 8px; border-bottom: 1px solid #eee; text-align: center; color: #333; }

        

        .master-summary-table { width: 100%; margin-top: 25px; border-collapse: collapse; font-size: 13px; border: 2px solid #1e3a8a; background: #fff; }

        .master-summary-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; }

        .data-label { font-weight: 800; color: #1e3a8a; background: #f8fafc; font-size: 11px; text-transform: uppercase; }

        .data-val { font-weight: 900; font-size: 16px; color: #111827; }

        .grade-pill { display: inline-block; padding: 4px 8px; background: #e2e8f0; border-radius: 4px; margin: 2px; font-weight: 700; font-size: 11px; }



        /* CHART STYLES */

        #chartWrapper { margin-top: 30px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 15px; background: #fdfdfd; }

        canvas#progressChart { max-height: 180px !important; }



        /* PRINTING MECHANISM */

        @media print {

            body * { visibility: hidden; }

            #masterRecordUI, #masterRecordUI * { visibility: visible; }

            #masterRecordUI { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; }

            .no-print { display: none !important; }

        }

    </style>



    <!-- Public Interface -->

    <div class="no-print">

        <div class="header-logo">Khadgakali School</div>

        <div class="sub-header">SEE Result Checking Portal</div>

        <div class="search-controls">

            <select id="yearSelect"></select>

            <input type="text" id="userInput" placeholder="Name or Symbol No.">

        </div>

        <button class="btn-main" onclick="fetchLiveResult()">Find Result</button>

        <div id="resultBox"></div>

        <button style="margin-top:15px; font-size:9px; color:#cbd5e1; background:none; border:none; cursor:pointer;" onclick="toggleAuth(true)">Admin Login</button>

    </div>



    <!-- Admin Auth Modal -->

    <div id="adminAuth" class="no-print" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center; padding:20px;">

        <div style="background:white; padding:30px; border-radius:20px; width:100%; max-width:320px; text-align:center;">

            <h3>Admin Access</h3>

            <input type="number" id="authKey" placeholder="Pass Key (Year)" style="width:100%; padding:10px; margin-bottom:5px;">

            <div id="authError" style="color:red; font-size:12px; display:none;">❌ Invalid Key.</div>

            <button class="btn-main" onclick="openAdmin()">AUTHORIZE</button>

            <button onclick="toggleAuth(false)" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cancel</button>

        </div>

    </div>



    <!-- Admin Master Dashboard -->

    <div id="adminPanel">

        <div class="no-print" style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">

            <h2 style="margin:0; flex-grow:1; font-size:18px; color:#1e3a8a;">Admin Records</h2>

            <button onclick="window.print()" style="padding:10px 20px; background:#facc15; border:none; border-radius:5px; font-weight:700; cursor:pointer;">📥 PRINT REPORT</button>

            <button onclick="closeAdmin()" style="padding:10px 20px; background:#dc2626; color:white; border:none; border-radius:5px; font-weight:700; cursor:pointer;">EXIT</button>

        </div>

        <div id="masterRecordUI">

            <div style="text-align:center; margin-bottom:25px;">

                <div class="header-logo">Khadgakali Secondary School</div>

                <div id="admTitle" style="font-weight:700; color:#4b5563; font-size:14px; border-bottom: 2px solid #eab308; display:inline-block;">Master Record List</div>

            </div>

            <div id="admList"></div>

            <div id="admSummaryGrid"></div>

            <div id="chartWrapper" class="no-print">

                <h3 style="font-size: 12px; color: #1e3a8a; margin-top:0;">Pass vs NG Rate % (Trend)</h3>

                <canvas id="progressChart"></canvas>

            </div>

        </div>

    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>

        const SHEET_ID = '1pWdR2XztXTexHVT_zqssUKibQg9JUdhAiBjIAbFVmKE';

        const NO_PHOTO = 'https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg';

        let availableYears = [];



        // Year logic: Automatic detection for academic year
        // Current academic year (2083) during Ashad (May=4, June=5)
        // Previous year (2082) before Ashad

        (function init() {

            const sel = document.getElementById('yearSelect');

            const now = new Date();

            const currentBS = now.getFullYear() + 57;

            const currentMonth = now.getMonth(); // 0=Jan, 4=May, 5=June



            // During Ashad (May-June): select current year (2083)
            // Before Ashad: select previous year (2082)

            let defaultYear = (currentMonth >= 4) ? currentBS : currentBS - 1;



            for (let yr = currentBS; yr >= 2077; yr--) {

                availableYears.push(yr);

                const opt = document.createElement('option');

                opt.value = yr; opt.innerText = yr + " B.S.";

                if(yr === defaultYear) opt.selected = true;

                sel.appendChild(opt);

            }

        })();



        async function fetchSheetData(year) {

            try {

                const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${year}`);

                const t = await r.text();

                return JSON.parse(t.substring(47).slice(0, -2));

            } catch (e) { return null; }

        }



        async function openAdmin() {

            const yr = document.getElementById('authKey').value;

            const json = await fetchSheetData(yr);

            if(!json) { document.getElementById('authError').style.display = 'block'; return; }



            let stats = { total: 0, reg: 0, part: 0, regPass: 0, regFail: 0, regGPASum: 0, partPass: 0, partFail: 0,

                intervals: { "4.0": 0, "3.6": 0, "3.2": 0, "2.8": 0, "2.4": 0, "2.0": 0, "1.6": 0, "NG": 0 } };



            let tableHtml = `<table class="zebra-table"><thead><tr><th>Reg No</th><th>Symbol</th><th>Name</th><th>Type</th><th>GPA</th><th>Status</th></tr></thead><tbody>`;

            

            json.table.rows.forEach(row => {

                const type = (row.c[5]?.v || "Regular").toLowerCase();

                const gpaVal = row.c[3]?.v;

                const gpa = parseFloat(gpaVal) || 0;

                const status = (row.c[4]?.v || "").toLowerCase();



                stats.total++;

                if(type.includes("partial")) { 

                    stats.part++; 

                    if(status === "pass") stats.partPass++; else stats.partFail++;

                } else { 

                    stats.reg++; 

                    stats.regGPASum += gpa;

                    if(status === "pass") stats.regPass++; else stats.regFail++;

                }



                if(status === "fail" || status === "ng") stats.intervals["NG"]++;

                else if(gpa > 3.6) stats.intervals["4.0"]++;

                else if(gpa > 3.2) stats.intervals["3.6"]++;

                else if(gpa > 2.8) stats.intervals["3.2"]++;

                else if(gpa > 2.4) stats.intervals["2.8"]++;

                else if(gpa > 2.0) stats.intervals["2.4"]++;

                else if(gpa > 1.6) stats.intervals["2.0"]++;

                else stats.intervals["1.6"]++;



                tableHtml += `<tr><td>${row.c[0]?.v || '-'}</td><td>${row.c[1]?.v || '-'}</td><td style="text-align:left; font-weight:600">${row.c[2]?.v}</td><td>${row.c[5]?.v || 'Reg'}</td><td>${row.c[3]?.v || '-'}</td><td style="color:${status==='pass'?'#16a34a':'#dc2626'}; font-weight:800">${row.c[4]?.v || '-'}</td></tr>`;

            });

            tableHtml += `</tbody></table>`;



            const avgGPA = stats.reg > 0 ? (stats.regGPASum / stats.reg).toFixed(2) : "0.00";



            let summaryHtml = `

            <table class="master-summary-table">

                <tr><td class="data-label">Overview</td><td>Total: <span class="data-val">${stats.total}</span></td><td>Regular: <span class="data-val">${stats.reg}</span></td><td>Partial: <span class="data-val">${stats.part}</span></td></tr>

                <tr><td class="data-label">Regulars</td><td>Pass: <span class="data-val" style="color:#16a34a">${stats.regPass}</span></td><td>NG: <span class="data-val" style="color:#dc2626">${stats.regFail}</span></td><td>Avg GPA: <span class="data-val">${avgGPA}</span></td></tr>

                <tr><td class="data-label">Partials</td><td colspan="2">Pass: <span class="data-val" style="color:#16a34a">${stats.partPass}</span></td><td>NG: <span class="data-val" style="color:#dc2626">${stats.partFail}</span></td></tr>

                <tr><td class="data-label">Grades</td><td colspan="3">

                    <span class="grade-pill">3.61-4.0: ${stats.intervals["4.0"]}</span> <span class="grade-pill">3.21-3.6: ${stats.intervals["3.6"]}</span>

                    <span class="grade-pill">2.81-3.2: ${stats.intervals["3.2"]}</span> <span class="grade-pill">2.41-2.8: ${stats.intervals["2.8"]}</span>

                    <span class="grade-pill">2.01-2.4: ${stats.intervals["2.4"]}</span> <span class="grade-pill">1.61-2.0: ${stats.intervals["2.0"]}</span>

                    <span class="grade-pill">1.21-1.6: ${stats.intervals["1.6"]}</span> <span class="grade-pill" style="color:#dc2626">NG: ${stats.intervals["NG"]}</span>

                </td></tr>

            </table>`;



            document.getElementById('adminAuth').style.display = 'none';

            document.getElementById('adminPanel').style.display = 'block';

            document.getElementById('admList').innerHTML = tableHtml;

            document.getElementById('admSummaryGrid').innerHTML = summaryHtml;

            document.getElementById('admTitle').innerText = `SEE Master Record List - ${yr} B.S.`;

            renderPercentageChart();

        }



        async function renderPercentageChart() {

            let labels = []; let passPerc = []; let ngPerc = [];

            for(let y of [...availableYears].reverse()) {

                const d = await fetchSheetData(y);

                if(d) {

                    labels.push(y); let p=0, n=0, total=d.table.rows.length;

                    d.table.rows.forEach(r => { 

                        if((r.c[4]?.v||"").toLowerCase()==="pass") p++; else n++;

                    });

                    passPerc.push(total > 0 ? ((p/total)*100).toFixed(1) : 0);

                    ngPerc.push(total > 0 ? ((n/total)*100).toFixed(1) : 0);

                }

            }

            const ctx = document.getElementById('progressChart').getContext('2d');

            if(window.pChart) window.pChart.destroy();

            window.pChart = new Chart(ctx, {

                type: 'line',

                data: { 

                    labels: labels, 

                    datasets: [

                        { label: 'Pass %', data: passPerc, borderColor: '#16a34a', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointRadius: 4 },

                        { label: 'NG %', data: ngPerc, borderColor: '#dc2626', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointRadius: 4 }

                    ]

                },

                options: { 

                    maintainAspectRatio: false, 

                    scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } },

                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 10 } } } }

                }

            });

        }



        async function fetchLiveResult() {

            const yr = document.getElementById('yearSelect').value;

            const q = document.getElementById('userInput').value.trim().toLowerCase();

            const box = document.getElementById('resultBox');

            if(!q) return; box.style.display = "block"; box.innerHTML = '🔍 Searching...';

            const json = await fetchSheetData(yr);

            const match = json?.table.rows.find(r => (r.c[1]?.v||"").toString().toLowerCase() === q || (r.c[2]?.v||"").toLowerCase().includes(q));

            if(match) renderCard(match.c, yr); else box.innerHTML = "No record found.";

        }



        function renderCard(s, yr) {

            const gpa = s[3]?.v || "0.00";

            const status = (s[4]?.v || "").trim().toLowerCase();

            const isPass = status === "pass";

            document.getElementById('resultBox').innerHTML = `

                <div class="capture-area" id="captureArea">

                    <div class="top-banner ${isPass?'banner-pass':'banner-fail'}">${isPass?'Congratulations!':'Result: '+status.toUpperCase()}</div>

                    <div class="star-container">★★★★★</div>

                    <div class="photo-section">

                        <div class="blue-bar"></div>

                        <div class="grad-cap cap-left">🎓</div><div class="grad-cap cap-right">🎓</div>

                        <div class="medal-icon m-left">🏅</div><div class="medal-icon m-right">🏅</div>

                        <div class="yellow-ribbon"></div>

                        <div class="student-photo-wrapper"><img src="${s[6]?.v || NO_PHOTO}"></div>

                    </div>

                    <div class="name-ribbon"><h2 class="student-name">${s[2]?.v}</h2></div>

                    <div class="unified-batch-ribbon"><div class="ribbon-left">BATCH: ${yr}</div><div class="ribbon-right">EXAM: ${s[5]?.v || 'REGULAR'}</div></div>

                    <div class="formal-msg-box">${isPass?'Heartiest congratulations!':'Keep working hard.'}</div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 20px 0;">

                        <div style="background:#1e3a8a; padding:6px; border-radius:10px; color:#fff; text-align:left;">

                            <span style="font-size:7px; font-weight:800; display:block;">SYMBOL NO.</span><span style="font-size:12px; font-weight:900;">${s[1]?.v}</span>

                        </div>

                        <div style="background:#1e3a8a; padding:6px; border-radius:10px; color:#fff; text-align:left;">

                            <span style="font-size:7px; font-weight:800; display:block;">REGIST. NO.</span><span style="font-size:12px; font-weight:900;">${s[0]?.v}</span>

                        </div>

                    </div>

                    <div class="score-bar">

                        <div style="text-align:left"><span style="font-size:8px; font-weight:800; display:block; color:#1e3a8a;">GPA</span><span style="font-size:1.4rem; font-weight:900;">${gpa}</span></div>

                        <div style="text-align:right"><span style="font-size:8px; font-weight:800; display:block; color:#1e3a8a;">STATUS</span><span style="font-size:0.85rem; font-weight:800; line-height:2.4;">${status.toUpperCase()}</span></div>

                    </div>

                </div>

                <button class="btn-main no-print" style="margin-top:15px; background:#059669;" onclick="downloadImage('${s[2]?.v}')">📥 SAVE AS IMAGE</button>`;

        }



        function downloadImage(name) {

            html2canvas(document.getElementById('captureArea'), {scale:3, useCORS:true}).then(canvas => {

                const link = document.createElement('a'); link.download = `${name}_Result.png`; link.href = canvas.toDataURL(); link.click();

            });

        }

        function toggleAuth(s) { document.getElementById('adminAuth').style.display = s?'flex':'none'; }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    </script>

</div>
