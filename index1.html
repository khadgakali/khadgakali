---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Index of / - git.khadgakali.edu.np</title>
    <style>
        :root { --blue: #0366d6; --gray: #586069; --border: #e1e4e8; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 30px; background: #f6f8fa; color: #24292e; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        
        .header { padding: 16px; background: #fafbfc; border-bottom: 1px solid var(--border); }
        .breadcrumb { font-size: 18px; font-weight: 600; }
        .breadcrumb a { color: var(--blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f6f8fa; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--gray); text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #eaecef; font-family: monospace; }
        
        tr:hover { background-color: #f1f8ff; }
        
        .type-icon { margin-right: 10px; width: 20px; display: inline-block; text-align: center; }
        .copy-btn { float: right; background: #2ea44f; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .copy-btn:hover { background: #2c974b; }
        
        .item-link { color: #0366d6; text-decoration: none; font-weight: 500; cursor: pointer; }
        .item-link:hover { text-decoration: underline; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--gray); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="breadcrumb" class="breadcrumb">Index of /</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 120px; text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody id="listing">
            </tbody>
    </table>
</div>

<footer>Generated by Jekyll Static Build for Khadga Kali Git</footer>

<script>
    // This array is populated by Jekyll at build time
    const allFiles = [
        {% for file in site.static_files %}
        "{{ file.path | remove_first: '/' }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    const BASE_DOMAIN = "https://git.khadgakali.edu.np";

    function render(currentDir) {
        const listing = document.getElementById('listing');
        const breadcrumb = document.getElementById('breadcrumb');
        listing.innerHTML = "";

        // 1. Render Breadcrumbs
        let breadHTML = `<a onclick="render('')">root</a>`;
        let pathAcc = "";
        const parts = currentDir.split('/').filter(p => p);
        parts.forEach(part => {
            pathAcc += (pathAcc ? '/' : '') + part;
            breadHTML += ` / <a onclick="render('${pathAcc}')">${part}</a>`;
        });
        breadcrumb.innerHTML = breadHTML;

        // 2. Add "Up" link
        if (currentDir !== "") {
            const parent = parts.slice(0, -1).join('/');
            addTr(".. [ Parent Directory ]", () => render(parent), "⤴️");
        }

        // 3. Extract Folders and Files at current level
        const folders = new Set();
        const files = [];

        allFiles.forEach(path => {
            if (path === 'index.html' || path === '404.html') return;

            if (path.startsWith(currentDir)) {
                // Get the relative path from the current directory
                const relative = currentDir ? path.substring(currentDir.length + 1) : path;
                const pathParts = relative.split('/');

                if (pathParts.length > 1) {
                    folders.add(pathParts[0]);
                } else {
                    files.push({ name: pathParts[0], fullPath: path });
                }
            }
        });

        // 4. Render Folders
        Array.from(folders).sort().forEach(folder => {
            const folderPath = currentDir ? `${currentDir}/${folder}` : folder;
            addTr(folder + "/", () => render(folderPath), "📁");
        });

        // 5. Render Files
        files.sort((a,b) => a.name.localeCompare(b.name)).forEach(file => {
            const hotlink = `${BASE_DOMAIN}/${file.fullPath}`;
            addTr(file.name, () => window.open(hotlink, '_blank'), "📄", hotlink);
        });
    }

    function addTr(name, action, icon, hotlink = null) {
        const tr = document.createElement('tr');
        
        const nameTd = document.createElement('td');
        const link = document.createElement('span');
        link.className = 'item-link';
        link.innerHTML = `<span class="type-icon">${icon}</span>${name}`;
        link.onclick = action;
        nameTd.appendChild(link);

        const actionTd = document.createElement('td');
        if (hotlink) {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = "Copy Link";
            btn.onclick = (e) => {
                e.stopPropagation();
                copyToClipboard(hotlink, btn);
            };
            actionTd.appendChild(btn);
        }

        tr.appendChild(nameTd);
        tr.appendChild(actionTd);
        document.getElementById('listing').appendChild(tr);
    }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const original = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#6a737d";
            setTimeout(() => {
                btn.innerText = original;
                btn.style.background = "#2ea44f";
            }, 1500);
        });
    }

    // Start at root
    render("");
</script>

</body>
</html>
