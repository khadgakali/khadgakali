---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Index of / - Khadga Kali Git</title>
    <style>
        :root {
            --primary: #0366d6;
            --text-main: #24292e;
            --text-muted: #586069;
            --bg: #f6f8fa;
            --border: #e1e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: var(--bg);
            color: var(--text-main);
        }

        .explorer-card {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.12);
            overflow: hidden;
        }

        .header {
            padding: 16px;
            background: #fafbfc;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .breadcrumb {
            font-size: 18px;
            font-weight: 500;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb a:hover { text-decoration: underline; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            background: #f6f8fa;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eaecef;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 14px;
        }

        tr:hover { background-color: #f1f8ff; }

        .icon { margin-right: 10px; font-size: 1.1em; }
        
        .item-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            display: block;
        }

        .copy-btn {
            background: #2ea44f;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            float: right;
        }

        .copy-btn:hover { background: #2c974b; }
        .copy-btn.copied { background: #6a737d; }
    </style>
</head>
<body>

<div class="explorer-card">
    <div class="header">
        <div id="breadcrumb" class="breadcrumb">Index of /</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 150px; text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody id="listing">
            </tbody>
    </table>
</div>

<script>
    // Build time file array generated by Jekyll
    const fileList = [
        {% for file in site.static_files %}
        "{{ file.path | remove_first: '/' }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    const DOMAIN = "https://git.khadgakali.edu.np";

    function navigate(targetDir) {
        const listing = document.getElementById('listing');
        const breadcrumb = document.getElementById('breadcrumb');
        listing.innerHTML = "";

        // 1. Update Breadcrumbs
        let breadHTML = `<a onclick="navigate('')">root</a>`;
        let pathParts = targetDir.split('/').filter(p => p);
        let accumulatedPath = "";
        pathParts.forEach(part => {
            accumulatedPath += (accumulatedPath ? '/' : '') + part;
            breadHTML += ` / <a onclick="navigate('${accumulatedPath}')">${part}</a>`;
        });
        breadcrumb.innerHTML = breadHTML;

        // 2. Add "Up" navigation
        if (targetDir !== "") {
            const upPath = pathParts.slice(0, -1).join('/');
            createRow(".. [ Parent Directory ]", () => navigate(upPath), "⤴️");
        }

        const folders = new Set();
        const files = [];

        // 3. Logic to separate folders and files in current view
        fileList.forEach(filePath => {
            // Ignore system files
            if (['index.html', '404.html', 'CNAME', '.nojekyll'].includes(filePath)) return;

            if (filePath.startsWith(targetDir)) {
                // Get segment relative to current directory
                let relative = targetDir ? filePath.substring(targetDir.length + 1) : filePath;
                let segments = relative.split('/');

                if (segments.length > 1) {
                    folders.add(segments[0]);
                } else {
                    files.push({ name: segments[0], fullPath: filePath });
                }
            }
        });

        // 4. Render Folders
        Array.from(folders).sort().forEach(folderName => {
            const nextPath = targetDir ? `${targetDir}/${folderName}` : folderName;
            createRow(folderName + "/", () => navigate(nextPath), "📁");
        });

        // 5. Render Files
        files.sort((a,b) => a.name.localeCompare(b.name)).forEach(file => {
            const hotlink = `${DOMAIN}/${file.fullPath}`;
            createRow(file.name, () => window.open(hotlink, '_blank'), "📄", hotlink);
        });
    }

    function createRow(name, action, icon, hotlink = null) {
        const tr = document.createElement('tr');
        const tdName = document.createElement('td');
        const tdAction = document.createElement('td');

        const link = document.createElement('a');
        link.className = "item-link";
        link.innerHTML = `<span class="icon">${icon}</span> ${name}`;
        link.onclick = action;
        tdName.appendChild(link);

        if (hotlink) {
            const btn = document.createElement('button');
            btn.className = "copy-btn";
            btn.innerText = "Copy Hotlink";
            btn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(hotlink);
                btn.innerText = "Copied!";
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerText = "Copy Hotlink";
                    btn.classList.remove('copied');
                }, 2000);
            };
            tdAction.appendChild(btn);
        }

        tr.appendChild(tdName);
        tr.appendChild(tdAction);
        document.getElementById('listing').appendChild(tr);
    }

    // Initial launch at root
    navigate("");
</script>

</body>
</html>
